<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flow Ai Invite</title>
</head>
<body>
<script>
(function () {
  var parts = location.pathname.split('/').filter(Boolean);
  var code = (parts.length >= 2) ? parts[1] : '';
  var ua = navigator.userAgent || '';
  var isAndroid = /Android/i.test(ua);
  var isIOS = /iPhone|iPad|iPod/i.test(ua);

  var appUrl = code ? ("flowai://invite/" + encodeURIComponent(code)) : "flowai://";

  var start = Date.now();
  location.href = appUrl;

  setTimeout(function(){
    if (Date.now() - start < 2000) {
      if (isIOS) location.href = "https://apps.apple.com/app/flow-ai/id6751801915";
      else if (isAndroid) location.href = "https://play.google.com/store/apps/details?id=com.flowai.app";
    }
  }, 900);
})();
</script>
</body>
</html>
