name: Bug report
description: Report a reproducible problem in Flow Ai
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Do not include credentials, private health data, or security vulnerabilities.

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Clearly describe the observed problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the minimum steps needed to reproduce the problem.
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Flow Ai version
      placeholder: "Example: 2.2.4"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - macOS
        - Web
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add sanitized logs or screenshots where relevant.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I removed credentials, personal data, and private health information.
          required: true
        - label: This is not a security vulnerability.
          required: true
