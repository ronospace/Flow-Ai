name: Deploy Flow Ai to Firebase Hosting on PR

on:
  pull_request:
    branches:
      - main
      - release/professional-integration-20260701

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Resolve locked dependencies
        run: flutter pub get

      - name: Analyze release source
        run: |
          dart analyze \
            --fatal-warnings \
            --fatal-infos \
            lib \
            test/core/services/runtime_privacy_defaults_test.dart

      - name: Run active tests
        shell: bash
        run: |
          set -Eeuo pipefail

          mapfile -d '' tests < <(
            find test \
              -type f \
              -name '*_test.dart' \
              ! -path 'test/_legacy_disabled/*' \
              -print0 |
            sort -z
          )

          (( ${#tests[@]} > 0 ))

          flutter test \
            --no-pub \
            --reporter=compact \
            "${tests[@]}"

      - name: Build web release
        run: flutter build web --release

      - name: Authenticate to Google Cloud
        id: google_auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/752724279049/locations/global/workloadIdentityPools/github-actions/providers/flow-ai-repository
          service_account: flow-ai-github-hosting@flow-ai-656b3.iam.gserviceaccount.com
          project_id: flow-ai-656b3
          token_format: access_token
          access_token_lifetime: 1800s
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform
          create_credentials_file: false
          export_environment_variables: false

      - name: Verify Firebase Hosting access
        shell: bash
        env:
          FIREBASE_ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
        run: |
          set -Eeuo pipefail

          result="$RUNNER_TEMP/firebase-hosting-sites.json"

          curl \
            --fail \
            --silent \
            --show-error \
            --header "Authorization: Bearer $FIREBASE_ACCESS_TOKEN" \
            --header 'Accept: application/json' \
            --output "$result" \
            'https://firebasehosting.googleapis.com/v1beta1/projects/flow-ai-656b3/sites'

          jq -e '
            any(
              .sites[];
              .name ==
                "projects/flow-ai-656b3/sites/flow-ai-656b3"
            )
          ' "$result" >/dev/null

          printf 'firebase_hosting_api_access=true\n'

      - name: Deploy Firebase preview through REST API
        shell: bash
        env:
          FIREBASE_ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
        run: |
          set -Eeuo pipefail

          result="$RUNNER_TEMP/firebase-hosting-preview.json"
          channel="pr-${{ github.event.pull_request.number }}"

          python3 tool/firebase_hosting_rest_deploy.py \
            --site flow-ai-656b3 \
            --public build/web \
            --channel "$channel" \
            --ttl 604800s \
            --message "PR #${{ github.event.pull_request.number }} ${GITHUB_SHA}" \
            --output "$result"

          jq . "$result"

          preview_url="$(
            jq -r '.channelUrl // empty' "$result"
          )"

          [[ "$(
            jq -r '.status' "$result"
          )" == success ]]

          [[ -n "$preview_url" ]]

          {
            echo '## Firebase Hosting preview'
            echo
            echo '- Authentication: keyless WIF'
            echo '- Project: `flow-ai-656b3`'
            echo "- Channel: \`$channel\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Preview: $preview_url"
          } >> "$GITHUB_STEP_SUMMARY"

          printf 'preview_url=%s\n' "$preview_url"
          printf 'firebase_preview_deployment_passed=true\n'
