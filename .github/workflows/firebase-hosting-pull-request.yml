name: Deploy Flow Ai to Firebase Hosting on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable
          cache: true

      - name: Resolve locked dependencies
        run: flutter pub get

      - name: Analyze release source
        run: |
          dart analyze \
            --fatal-warnings \
            --fatal-infos \
            lib \
            test/core/services/runtime_privacy_defaults_test.dart

      - name: Run active tests
        shell: bash
        run: |
          set -Eeuo pipefail

          mapfile -d '' tests < <(
            find test \
              -type f \
              -name '*_test.dart' \
              ! -path 'test/_legacy_disabled/*' \
              -print0 |
            sort -z
          )

          (( ${#tests[@]} > 0 ))

          flutter test \
            --no-pub \
            --reporter=compact \
            "${tests[@]}"

      - name: Build web release
        run: flutter build web --release

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/752724279049/locations/global/workloadIdentityPools/github-actions/providers/flow-ai-repository
          service_account: flow-ai-github-hosting@flow-ai-656b3.iam.gserviceaccount.com
          project_id: flow-ai-656b3
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install pinned Firebase CLI
        run: npm install --global firebase-tools@15.10.1

      - name: Deploy Firebase preview channel
        shell: bash
        run: |
          set -Eeuo pipefail

          channel="pr-${{ github.event.pull_request.number }}"
          result="$RUNNER_TEMP/firebase-preview.json"
          error_log="$RUNNER_TEMP/firebase-preview.stderr"

          set +e
          firebase hosting:channel:deploy "$channel" \
            --expires 7d \
            --project flow-ai-656b3 \
            --non-interactive \
            --json \
            > "$result" \
            2> "$error_log"
          deploy_status=$?
          set -e

          printf 'firebase_cli_exit_status=%s\n' "$deploy_status"

          if [[ -s "$error_log" ]]; then
            printf '%s\n' '=== FIREBASE STDERR ==='

            sed -E \
              -e 's/(Bearer[[:space:]]+)[^[:space:]]+/\1[REDACTED]/g' \
              -e 's/([Tt]oken["=:[:space:]]+)[^[:space:]",]+/\1[REDACTED]/g' \
              "$error_log"
          fi

          if [[ ! -s "$result" ]]; then
            echo '::error::Firebase CLI returned no JSON result.'
            exit "${deploy_status:-1}"
          fi

          if ! jq empty "$result" 2>/dev/null; then
            echo '::error::Firebase CLI returned invalid JSON.'
            head -c 4000 "$result"
            printf '\n'
            exit "${deploy_status:-1}"
          fi

          firebase_status="$(
            jq -r '.status // empty' "$result"
          )"

          printf 'firebase_json_status=%s\n' \
            "${firebase_status:-unspecified}"

          if [[ "$deploy_status" -ne 0 ]] ||
             [[ "$firebase_status" == error ]]; then
            echo '::error::Firebase preview deployment failed.'
            printf '%s\n' '=== SANITIZED FIREBASE DIAGNOSTICS ==='

            jq -r '
              paths(scalars) as $path |
              ($path[-1] | tostring) as $key |
              select(
                $key |
                test(
                  "^(status|code|message|error|reason)$";
                  "i"
                )
              ) |
              "\($path | map(tostring) | join("."))=" +
              "\(getpath($path) | tostring)"
            ' "$result" |
            head -n 100

            exit "$(
              if [[ "$deploy_status" -eq 0 ]]
              then printf '1'
              else printf '%s' "$deploy_status"
              fi
            )"
          fi

          preview_url="$(
            jq -r '
              .. |
              strings |
              select(test("^https://"))
            ' "$result" |
            awk '
              /\.web\.app|\.firebaseapp\.com/ {
                print
                exit
              }
            '
          )"

          if [[ -z "$preview_url" ]]; then
            preview_url="$(
              jq -r '
                .. |
                strings |
                select(test("^https://"))
              ' "$result" |
              awk 'NR == 1 { print; exit }'
            )"
          fi

          printf '%s\n' '=== FIREBASE RESULT SUMMARY ==='

          jq -r '
            paths(scalars) as $path |
            ($path[-1] | tostring) as $key |
            select(
              $key |
              test(
                "^(status|site|channel|channelId|url|expireTime|releaseTime)$";
                "i"
              )
            ) |
            "\($path | map(tostring) | join("."))=" +
            "\(getpath($path) | tostring)"
          ' "$result" |
          head -n 100

          {
            echo "## Firebase Hosting preview"
            echo
            echo "- Project: \`flow-ai-656b3\`"
            echo "- Channel: \`$channel\`"
            echo "- Commit: \`${GITHUB_SHA}\`"

            if [[ -n "$preview_url" ]]; then
              echo "- Preview: $preview_url"
            else
              echo "- Preview URL: deployed successfully; URL not present in CLI JSON"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          printf 'preview_channel=%s\n' "$channel"
          printf 'preview_url=%s\n' "${preview_url:-unavailable}"
          printf 'firebase_preview_deploy_succeeded=true\n'
