# https://github.com/firebase/firebase-tools

name: Deploy Flow Ai to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    permissions:
      contents: read
      id-token: write
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'
      
      # Get Flutter dependencies
      - run: flutter pub get
      
      # Build Flutter web
      - run: flutter build web --release
      
      # Deploy to Firebase Hosting Preview
      - name: Deploy Firebase Hosting (preview)
        if: ${{ vars.FIREBASE_HOSTING_DEPLOY_ENABLED == 'true' }}
        uses: ./.github/actions/firebase-hosting-deploy
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_FLOW_AI }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_FLOW_AI }}
          mode: preview
          channel: pr-${{ github.event.number }}
