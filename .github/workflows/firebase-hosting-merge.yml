name: Deploy Flow Ai to Firebase Hosting on merge

on:
  push:
    branches:
      - main
      - release/central-integration-20260720

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Set up Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Validate production release candidate
        run: bash .github/scripts/validate_release.sh

      - name: Authenticate to Google Cloud
        id: google_auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: projects/752724279049/locations/global/workloadIdentityPools/github-actions/providers/flow-ai-repository
          service_account: flow-ai-github-hosting@flow-ai-656b3.iam.gserviceaccount.com
          project_id: flow-ai-656b3
          token_format: access_token
          access_token_lifetime: 1800s
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform
          create_credentials_file: false
          export_environment_variables: false

      - name: Verify Firebase Hosting access
        shell: bash
        env:
          FIREBASE_ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
        run: |
          set -Eeuo pipefail

          result="$RUNNER_TEMP/firebase-hosting-sites.json"

          curl \
            --fail \
            --silent \
            --show-error \
            --header "Authorization: Bearer $FIREBASE_ACCESS_TOKEN" \
            --header 'Accept: application/json' \
            --output "$result" \
            'https://firebasehosting.googleapis.com/v1beta1/projects/flow-ai-656b3/sites'

          jq -e '
            any(
              .sites[];
              .name ==
                "projects/flow-ai-656b3/sites/flow-ai-656b3"
            )
          ' "$result" >/dev/null

          printf 'firebase_hosting_api_access=true\n'

      - name: Deploy Firebase Hosting production through REST API
        shell: bash
        env:
          FIREBASE_ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
        run: |
          set -Eeuo pipefail

          result="$RUNNER_TEMP/firebase-hosting-production.json"

          python3 tool/firebase_hosting_rest_deploy.py \
            --site flow-ai-656b3 \
            --public build/web \
            --channel live \
            --message "GitHub Actions ${GITHUB_SHA}" \
            --output "$result"

          jq . "$result"

          [[ "$(
            jq -r '.status' "$result"
          )" == success ]]

          printf 'firebase_production_deployment_passed=true\n'
