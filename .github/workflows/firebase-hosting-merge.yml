# https://github.com/firebase/firebase-tools

name: Deploy Flow Ai to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'
      
      # Get Flutter dependencies
      - run: flutter pub get
      
      # Build Flutter web
      - run: flutter build web --release
      
      # Deploy to Firebase Hosting
      - name: Deploy Firebase Hosting (live)
        if: ${{ vars.FIREBASE_HOSTING_DEPLOY_ENABLED == 'true' }}
        uses: ./.github/actions/firebase-hosting-deploy
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_FLOW_AI }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_FLOW_AI }}
          mode: live
