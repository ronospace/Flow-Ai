name: Deploy Flow Ai to Firebase Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable
          cache: true

      - name: Resolve locked dependencies
        run: flutter pub get

      - name: Analyze release source
        run: |
          dart analyze \
            --fatal-warnings \
            --fatal-infos \
            lib \
            test/core/services/runtime_privacy_defaults_test.dart

      - name: Run active tests
        shell: bash
        run: |
          set -Eeuo pipefail

          mapfile -d '' tests < <(
            find test \
              -type f \
              -name '*_test.dart' \
              ! -path 'test/_legacy_disabled/*' \
              -print0 |
            sort -z
          )

          (( ${#tests[@]} > 0 ))

          flutter test \
            --no-pub \
            --reporter=compact \
            "${tests[@]}"

      - name: Build web release
        run: flutter build web --release

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/752724279049/locations/global/workloadIdentityPools/github-actions/providers/flow-ai-repository
          service_account: flow-ai-github-hosting@flow-ai-656b3.iam.gserviceaccount.com
          project_id: flow-ai-656b3
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install pinned Firebase CLI
        run: npm install --global firebase-tools@15.10.1

      - name: Deploy Firebase Hosting production
        shell: bash
        run: |
          set -Eeuo pipefail

          firebase deploy \
            --only hosting \
            --project flow-ai-656b3 \
            --non-interactive \
            --message "GitHub Actions ${GITHUB_SHA}"
